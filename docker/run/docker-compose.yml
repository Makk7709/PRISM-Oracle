# ═══════════════════════════════════════════════════════════════════════════════
# KOREV ORACLE - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# IMPORTANT: Cette configuration nécessite une image Docker personnalisée.
# 
# Pour construire l'image Korev Oracle:
#   cd /chemin/vers/korev-oracle
#   docker build -f DockerfileLocal -t korev-oracle:local .
#
# Puis lancer:
#   docker compose up -d
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  korev-oracle:
    container_name: korev-oracle
    # Image locale construite avec DockerfileLocal
    image: korev-oracle:local
    build:
      context: ../..
      dockerfile: DockerfileLocal
    volumes:
      - ./data:/korev
      - ../../.env:/a0/.env:ro
    ports:
      - "${ORACLE_PORT:-50080}:80"
    environment:
      - WEB_UI_PORT=80
    restart: unless-stopped
