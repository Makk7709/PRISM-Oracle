# ═══════════════════════════════════════════════════════════════════════════════
# KOREV EVIDENCE - Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# IMPORTANT: Cette configuration nécessite une image Docker personnalisée.
# 
# Pour construire l'image Korev Evidence:
#   cd /chemin/vers/korev-evidence
#   docker build -f DockerfileLocal -t korev-evidence:local .
#
# Puis lancer:
#   docker compose up -d
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  korev-evidence:
    container_name: korev-evidence
    # Image locale construite avec DockerfileLocal
    image: korev-evidence:local
    build:
      context: ../..
      dockerfile: DockerfileLocal
    volumes:
      - ./data:/korev
      - ../../.env:/a0/.env:ro
    ports:
      - "${EVIDENCE_PORT:-50080}:80"
    environment:
      - WEB_UI_PORT=80
    restart: unless-stopped
