<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
    </script>
    <!-- Playfair Display for sovereign typography -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div x-data x-show="$store.welcomeStore && $store.welcomeStore.isVisible">
        <template x-if="$store.welcomeStore">
            <div x-data="$store.welcomeStore" class="korev-home">
                <!-- Background Grid -->
                <div class="korev-home__grid"></div>
                
                <!-- Main Content -->
                <div class="korev-home__content">
                    
                    <!-- Hero Section -->
                    <div class="korev-home__hero">
                        <h1 class="korev-home__title">
                            <span class="korev-home__title-brand">KOREV</span>
                            <span class="korev-home__title-evidence">Evidence</span>
                        </h1>
                        <p class="korev-home__subtitle" x-text="t('welcome.ecosystem_subtitle') || 'SYSTÈME COGNITIF AU SEIN DE L\'ÉCOSYSTÈME KOREV'">
                            SYSTÈME COGNITIF AU SEIN DE L'ÉCOSYSTÈME KOREV
                        </p>
                    </div>

                    <!-- Architecture Diagram -->
                    <div class="korev-home__architecture">
                        <!-- Evidence Layer -->
                        <div class="korev-home__layer korev-home__layer--evidence">
                            <span class="korev-home__layer-label">COUCHE COGNITIVE</span>
                            <span class="korev-home__layer-name">Evidence</span>
                            <span class="korev-home__layer-status">ACTIF</span>
                        </div>
                        
                        <!-- Connector -->
                        <div class="korev-home__connector"></div>
                        
                        <!-- PRISM Layer -->
                        <div class="korev-home__layer korev-home__layer--prism">
                            <span class="korev-home__layer-label">INFRASTRUCTURE SOUVERAINE</span>
                            <span class="korev-home__layer-name">PRISM</span>
                            <span class="korev-home__layer-status">SOCLE</span>
                        </div>
                        
                        <!-- Connector -->
                        <div class="korev-home__connector korev-home__connector--short"></div>
                        
                        <!-- Modules -->
                        <div class="korev-home__modules">
                            <div class="korev-home__module">
                                <span class="korev-home__module-name">NEXUS</span>
                            </div>
                            <div class="korev-home__module">
                                <span class="korev-home__module-name">AEGIS</span>
                            </div>
                            <div class="korev-home__module">
                                <span class="korev-home__module-name">ATLAS</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="korev-home__actions">
                        <button class="korev-home__action korev-home__action--primary" 
                                @click="executeAction('new-chat')" 
                                tabindex="0">
                            <span class="korev-home__action-text" x-text="t('welcome.initiate_session') || 'Initier une session'">Initier une session</span>
                        </button>
                        
                        <button class="korev-home__action korev-home__action--secondary" 
                                @click="executeAction('projects')" 
                                tabindex="0">
                            <span class="korev-home__action-text" x-text="t('welcome.explore_ecosystem') || 'Explorer l\'écosystème'">Explorer l'écosystème</span>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <style>
        /* ═══════════════════════════════════════════════════════════════════════
         * KOREV HOME — Sovereign Cognitive Interface
         * Design: Authority, Hierarchy, Premium Minimal
         * ═══════════════════════════════════════════════════════════════════════ */
        
        .korev-home {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--prism-space-6);
            background: var(--prism-bg-base);
            overflow: hidden;
        }

        /* Background Grid */
        .korev-home__grid {
            position: absolute;
            inset: 0;
            background: var(--prism-refraction-grid);
            pointer-events: none;
            z-index: 0;
        }

        .korev-home__content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 700px;
            width: 100%;
            gap: var(--prism-space-8);
        }

        /* ─────────────────────────────────────────────────────────────────────
         * HERO SECTION
         * ───────────────────────────────────────────────────────────────────── */
        .korev-home__hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--prism-space-3);
        }

        .korev-home__title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 400;
            color: var(--prism-text-primary);
            margin: 0;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .korev-home__title-brand {
            font-weight: 700;
        }

        .korev-home__title-evidence {
            font-weight: 400;
            font-style: italic;
            margin-left: 0.15em;
        }

        .korev-home__subtitle {
            font-family: var(--prism-font-sans);
            font-size: 11px;
            font-weight: 500;
            color: var(--prism-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin: 0;
        }

        /* ─────────────────────────────────────────────────────────────────────
         * ARCHITECTURE DIAGRAM
         * ───────────────────────────────────────────────────────────────────── */
        .korev-home__architecture {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            width: 100%;
            max-width: 320px;
        }

        /* Layer Box */
        .korev-home__layer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: var(--prism-space-5) var(--prism-space-6);
            border: 1px solid var(--prism-border);
            border-radius: var(--prism-radius-md);
            background: var(--prism-bg-surface);
            gap: var(--prism-space-1);
        }

        .korev-home__layer--evidence {
            border-color: var(--prism-accent);
            background: color-mix(in srgb, var(--prism-accent) 5%, var(--prism-bg-surface));
        }

        .korev-home__layer--prism {
            background: var(--prism-bg-surface-2);
        }

        .korev-home__layer-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--prism-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .korev-home__layer-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: var(--prism-text-xl);
            font-weight: 500;
            color: var(--prism-text-primary);
        }

        .korev-home__layer--evidence .korev-home__layer-name {
            color: var(--prism-accent);
        }

        .korev-home__layer-status {
            position: absolute;
            right: var(--prism-space-4);
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            font-weight: 600;
            color: var(--prism-text-muted);
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        /* Connector */
        .korev-home__connector {
            width: 1px;
            height: 32px;
            background: var(--prism-border);
        }

        .korev-home__connector--short {
            height: 20px;
        }

        /* Modules Row */
        .korev-home__modules {
            display: flex;
            gap: var(--prism-space-3);
            width: 100%;
        }

        .korev-home__module {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--prism-space-4) var(--prism-space-3);
            border: 1px solid var(--prism-border-subtle);
            border-radius: var(--prism-radius-sm);
            background: var(--prism-bg-surface);
        }

        .korev-home__module-name {
            font-size: 10px;
            font-weight: 600;
            color: var(--prism-text-muted);
            letter-spacing: 0.1em;
        }

        /* ─────────────────────────────────────────────────────────────────────
         * ACTION BUTTONS
         * ───────────────────────────────────────────────────────────────────── */
        .korev-home__actions {
            display: flex;
            gap: var(--prism-space-4);
            width: 100%;
            max-width: 480px;
        }

        .korev-home__action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--prism-space-5) var(--prism-space-6);
            border-radius: var(--prism-radius-md);
            font-family: var(--prism-font-sans);
            font-size: var(--prism-text-sm);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--prism-transition-base);
            text-decoration: none;
        }

        .korev-home__action--primary {
            background: var(--prism-accent);
            border: 1px solid var(--prism-accent);
            color: white;
        }

        .korev-home__action--primary:hover {
            background: var(--prism-accent-hover);
            border-color: var(--prism-accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--prism-shadow-soft);
        }

        .korev-home__action--secondary {
            background: transparent;
            border: 1px solid var(--prism-border);
            color: var(--prism-text-primary);
        }

        .korev-home__action--secondary:hover {
            background: var(--prism-bg-surface);
            border-color: var(--prism-border-strong);
            transform: translateY(-2px);
        }

        .korev-home__action:focus-visible {
            outline: none;
            box-shadow: var(--prism-focus-ring);
        }

        .korev-home__action:active {
            transform: translateY(0);
        }

        /* ─────────────────────────────────────────────────────────────────────
         * RESPONSIVE
         * ───────────────────────────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .korev-home {
                padding: var(--prism-space-5);
            }

            .korev-home__title {
                font-size: 2rem;
            }

            .korev-home__actions {
                flex-direction: column;
            }

            .korev-home__modules {
                flex-direction: column;
            }

            .korev-home__layer-status {
                position: static;
                transform: none;
                margin-top: var(--prism-space-2);
            }
        }

        /* ─────────────────────────────────────────────────────────────────────
         * LIGHT MODE
         * ───────────────────────────────────────────────────────────────────── */
        .light-mode .korev-home {
            background: var(--prism-bg-base);
        }

        .light-mode .korev-home__layer--evidence {
            background: color-mix(in srgb, var(--prism-accent) 8%, white);
        }
    </style>
</body>

</html>
