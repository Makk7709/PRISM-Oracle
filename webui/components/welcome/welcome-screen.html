<html>

<head>
    <script type="module">
        import { store } from "/components/welcome/welcome-store.js";
    </script>
</head>

<body>
    <div x-data x-show="$store.welcomeStore && $store.welcomeStore.isVisible">
        <template x-if="$store.welcomeStore">
            <div x-data="$store.welcomeStore" class="prism-welcome">
                <!-- Refraction Grid Background -->
                <div class="prism-welcome__grid"></div>
                
                <!-- Content Container -->
                <div class="prism-welcome__content">
                    <!-- Korev Oracle Logo -->
                    <div class="prism-welcome__logo">
                        <img src="./public/korev-oracle-logo.svg" alt="Korev Oracle" class="prism-welcome__logo-img prism-welcome__logo-img--dark" />
                        <img src="./public/korev-oracle-logo-light.svg" alt="Korev Oracle" class="prism-welcome__logo-img prism-welcome__logo-img--light" />
                    </div>

                    <!-- Brand hierarchy: KOREV > ORACLE > endorsement > status -->
                    <h1 class="prism-welcome__brand">KOREV</h1>
                    <span class="prism-welcome__overline">Oracle</span>
                    <span class="prism-welcome__endorsement">by KOREV AI</span>
                    <p class="prism-welcome__title">Cognitive system</p>
                    <p class="prism-welcome__subtitle">
                        Select an action below to begin.
                    </p>

                    <!-- Action Cards with Prism Cut -->
                    <div class="prism-welcome__actions">
                        <button class="prism-welcome__card" @click="executeAction('new-chat')" tabindex="0">
                            <div class="prism-welcome__card-inner">
                                <span class="material-symbols-outlined prism-welcome__icon">add_circle</span>
                                <div class="prism-welcome__card-text">
                                    <h3 class="prism-welcome__card-title">New Chat</h3>
                                    <p class="prism-welcome__card-desc">Start conversation</p>
                                </div>
                            </div>
                        </button>

                        <button class="prism-welcome__card" @click="executeAction('projects')" tabindex="0">
                            <div class="prism-welcome__card-inner">
                                <span class="material-symbols-outlined prism-welcome__icon">folder</span>
                                <div class="prism-welcome__card-text">
                                    <h3 class="prism-welcome__card-title">Projects</h3>
                                    <p class="prism-welcome__card-desc">Manage workspaces</p>
                                </div>
                            </div>
                        </button>

                        <button class="prism-welcome__card" @click="executeAction('memory')" tabindex="0">
                            <div class="prism-welcome__card-inner">
                                <span class="material-symbols-outlined prism-welcome__icon">memory</span>
                                <div class="prism-welcome__card-text">
                                    <h3 class="prism-welcome__card-title">Memory</h3>
                                    <p class="prism-welcome__card-desc">Knowledge base</p>
                                </div>
                            </div>
                        </button>

                        <button class="prism-welcome__card" @click="executeAction('settings')" tabindex="0">
                            <div class="prism-welcome__card-inner">
                                <span class="material-symbols-outlined prism-welcome__icon">settings</span>
                                <div class="prism-welcome__card-text">
                                    <h3 class="prism-welcome__card-title">Settings</h3>
                                    <p class="prism-welcome__card-desc">Configure system</p>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <style>
        /* ═══════════════════════════════════════════════════════════════════════
         * PRISM WELCOME SCREEN
         * Premium, minimal, identifiable PRISM identity
         * ═══════════════════════════════════════════════════════════════════════ */
        
        .prism-welcome {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--prism-space-6);
            background: var(--prism-bg-base);
            overflow: hidden;
        }

        /* Refraction Grid — Ultra-subtle background pattern */
        .prism-welcome__grid {
            position: absolute;
            inset: 0;
            background: var(--prism-refraction-grid);
            pointer-events: none;
            z-index: 0;
        }

        .prism-welcome__content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        /* Logo */
        .prism-welcome__logo {
            margin-bottom: var(--prism-space-5);
        }

        .prism-welcome__logo-img {
            width: 88px;
            height: 88px;
            opacity: 0.9;
        }
        /* Important: do NOT invert the Korev Oracle logo.
           The provided SVG already encodes correct colors (black bg, white mark). */
        .prism-welcome__logo-img {
            filter: none;
        }
        .prism-welcome__logo-img--light {
            display: none;
        }
        [data-theme="light"] .prism-welcome__logo-img--dark {
            display: none;
        }
        [data-theme="light"] .prism-welcome__logo-img--light {
            display: block;
        }
        .light-mode .prism-welcome__logo-img--dark {
            display: none;
        }
        .light-mode .prism-welcome__logo-img--light {
            display: block;
        }

        /* PRISM Brand Title — Main identity */
        .prism-welcome__brand {
            font-family: var(--prism-font-sans);
            font-size: var(--prism-text-3xl);
            font-weight: 600;
            color: var(--prism-text-primary);
            margin: 0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ORACLE Overline — Module identifier */
        .prism-welcome__overline {
            font-size: 11px;
            font-weight: 600;
            color: var(--prism-accent);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: var(--prism-space-1);
            opacity: 0.9;
        }

        /* Endorsement — Discreet marketing signature */
        .prism-welcome__endorsement {
            font-size: 11px;
            font-weight: 400;
            color: var(--prism-text-muted);
            letter-spacing: 0.02em;
            margin-bottom: var(--prism-space-3);
            opacity: 0.75;
        }

        /* Title — Short, system-like */
        .prism-welcome__title {
            font-family: var(--prism-font-sans);
            font-size: var(--prism-text-2xl);
            font-weight: 500;
            color: var(--prism-text-primary);
            margin: 0 0 var(--prism-space-2) 0;
            letter-spacing: -0.02em;
        }

        .prism-welcome__subtitle {
            font-size: var(--prism-text-sm);
            color: var(--prism-text-secondary);
            margin: 0 0 var(--prism-space-8) 0;
            line-height: var(--prism-leading-relaxed);
        }

        /* Actions Grid — 2x2 */
        .prism-welcome__actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--prism-space-4);
            width: 100%;
            max-width: 400px;
        }

        /* Card — Prism Cut signature */
        .prism-welcome__card {
            position: relative;
            background: var(--prism-bg-surface);
            border: 1px solid var(--prism-border);
            border-radius: var(--prism-radius-lg);
            padding: 0;
            cursor: pointer;
            transition: all var(--prism-transition-base);
            text-align: left;
            font-family: inherit;
            
            /* Prism Cut — Signature beveled corner */
            clip-path: polygon(
                0 0,
                calc(100% - 14px) 0,
                100% 14px,
                100% 100%,
                0 100%
            );
        }

        /* Spectral Edge — Left accent line on hover */
        .prism-welcome__card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--prism-accent-gradient);
            border-radius: 2px 0 0 2px;
            opacity: 0;
            transition: opacity var(--prism-transition-base);
        }

        .prism-welcome__card:hover {
            border-color: var(--prism-border-strong);
            box-shadow: var(--prism-shadow-soft);
            transform: translateY(-3px);
        }

        .prism-welcome__card:hover::before {
            opacity: 1;
        }

        .prism-welcome__card:focus-visible {
            outline: none;
            box-shadow: var(--prism-focus-ring);
        }

        .prism-welcome__card:active {
            transform: translateY(-1px);
        }

        .prism-welcome__card-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: var(--prism-space-5) var(--prism-space-4);
            gap: var(--prism-space-3);
        }

        /* Icon */
        .prism-welcome__icon {
            font-size: 28px;
            color: var(--prism-accent);
            opacity: 0.85;
            transition: opacity var(--prism-transition-fast);
        }

        .prism-welcome__card:hover .prism-welcome__icon {
            opacity: 1;
        }

        /* Card Text */
        .prism-welcome__card-text {
            text-align: center;
        }

        .prism-welcome__card-title {
            font-size: var(--prism-text-sm);
            font-weight: 500;
            color: var(--prism-text-primary);
            margin: 0 0 var(--prism-space-1) 0;
        }

        .prism-welcome__card-desc {
            font-size: var(--prism-text-xs);
            color: var(--prism-text-muted);
            margin: 0;
        }

        /* ─────────────────────────────────────────────────────────────────────
         * RESPONSIVE
         * ───────────────────────────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .prism-welcome {
                padding: var(--prism-space-5);
            }

            .prism-welcome__title {
                font-size: var(--prism-text-xl);
            }

            .prism-welcome__actions {
                grid-template-columns: 1fr;
                gap: var(--prism-space-3);
            }

            .prism-welcome__card-inner {
                flex-direction: row;
                padding: var(--prism-space-4);
                gap: var(--prism-space-4);
            }

            .prism-welcome__card-text {
                text-align: left;
            }

            .prism-welcome__icon {
                font-size: 24px;
            }
        }

        /* ─────────────────────────────────────────────────────────────────────
         * LIGHT MODE ADJUSTMENTS
         * ───────────────────────────────────────────────────────────────────── */
        .light-mode .prism-welcome {
            background: var(--prism-bg-base);
        }

        .light-mode .prism-welcome__card {
            background: var(--prism-bg-surface);
        }
    </style>
</body>

</html>
