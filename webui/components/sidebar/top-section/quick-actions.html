<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/chats/chats-store.js";
  </script>
</head>

<body>
  <div class="prism-sidebar-actions" x-data>
    <!-- WORKSPACE Section -->
    <div class="prism-sidebar-section">
      <div class="prism-section-header">
        <span class="material-symbols-outlined prism-section-icon">workspaces</span>
        <h3 class="prism-section-title" x-text="t('sidebar.workspace')">Workspace</h3>
      </div>
      <div class="prism-action-grid">
        <button class="prism-action-btn" @click="$store.chats.newChat()">
          <span class="material-symbols-outlined">add_circle</span>
          <span x-text="t('sidebar.new_chat')">New Chat</span>
        </button>
        <button class="prism-action-btn" @click="$store.chats.loadChats()">
          <span class="material-symbols-outlined">folder_open</span>
          <span x-text="t('sidebar.load_chat')">Load Chat</span>
        </button>
        <button class="prism-action-btn" @click="$store.chats.saveChat()">
          <span class="material-symbols-outlined">save</span>
          <span x-text="t('sidebar.save_chat')">Save Chat</span>
        </button>
        <button class="prism-action-btn" @click="deselectChat()">
          <span class="material-symbols-outlined">dashboard</span>
          <span x-text="t('sidebar.dashboard')">Dashboard</span>
        </button>
      </div>
    </div>

    <!-- SYSTEM Section -->
    <div class="prism-sidebar-section">
      <div class="prism-section-header">
        <span class="material-symbols-outlined prism-section-icon">settings_suggest</span>
        <h3 class="prism-section-title" x-text="t('sidebar.system')">System</h3>
      </div>
      <div class="prism-action-grid">
        <button class="prism-action-btn" @click="openModal('settings/memory/memory-dashboard.html');">
          <span class="material-symbols-outlined">memory</span>
          <span x-text="t('sidebar.memory')">Memory</span>
        </button>
        <button class="prism-action-btn" @click="settingsModalProxy.openModal()">
          <span class="material-symbols-outlined">settings</span>
          <span x-text="t('sidebar.settings')">Settings</span>
        </button>
        <button class="prism-action-btn prism-action-btn--subtle" @click="$store.chats.resetChat()">
          <span class="material-symbols-outlined">refresh</span>
          <span x-text="t('sidebar.reset')">Reset</span>
        </button>
        <button class="prism-action-btn prism-action-btn--subtle" @click="$store.chats.restart()">
          <span class="material-symbols-outlined">restart_alt</span>
          <span x-text="t('sidebar.restart')">Restart</span>
        </button>
      </div>
    </div>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM SIDEBAR ACTIONS
     * ═══════════════════════════════════════════════════════════════════════ */
    .prism-sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: var(--prism-space-5);
    }

    /* Section */
    .prism-sidebar-section {
      display: flex;
      flex-direction: column;
    }

    /* Section Header */
    .prism-sidebar-actions .prism-section-header {
      display: flex;
      align-items: center;
      gap: var(--prism-space-2);
      margin-bottom: var(--prism-space-3);
      padding-bottom: var(--prism-space-2);
      border-bottom: 1px solid var(--prism-border-subtle);
    }

    .prism-sidebar-actions .prism-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--prism-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0;
    }

    .prism-sidebar-actions .prism-section-icon {
      font-size: 14px;
      color: var(--prism-text-muted);
      opacity: 0.6;
    }

    /* Action Grid */
    .prism-action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--prism-space-2);
    }

    /* Action Button */
    .prism-action-btn {
      display: flex;
      align-items: center;
      gap: var(--prism-space-2);
      padding: var(--prism-space-3);
      background: var(--prism-bg-surface-2);
      border: 1px solid var(--prism-border);
      border-radius: var(--prism-radius-md);
      color: var(--prism-text-primary);
      font-family: var(--prism-font-sans);
      font-size: var(--prism-text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--prism-transition-fast);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      position: relative;
    }

    .prism-action-btn .material-symbols-outlined {
      font-size: 16px;
      color: var(--prism-accent);
      opacity: 0.8;
      flex-shrink: 0;
      transition: opacity var(--prism-transition-fast);
    }

    /* Spectral Edge on hover */
    .prism-action-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--prism-accent-gradient);
      opacity: 0;
      transition: opacity var(--prism-transition-fast);
    }

    .prism-action-btn:hover {
      background: var(--prism-bg-elevated);
      border-color: var(--prism-border-strong);
    }

    .prism-action-btn:hover::before {
      opacity: 1;
    }

    .prism-action-btn:hover .material-symbols-outlined {
      opacity: 1;
    }

    .prism-action-btn:focus-visible {
      outline: none;
      box-shadow: var(--prism-focus-ring);
    }

    .prism-action-btn:active {
      transform: scale(0.98);
    }

    /* Subtle variant for secondary actions */
    .prism-action-btn--subtle {
      background: transparent;
      border-color: transparent;
    }

    .prism-action-btn--subtle .material-symbols-outlined {
      color: var(--prism-text-secondary);
    }

    .prism-action-btn--subtle:hover {
      background: var(--prism-bg-surface-2);
      border-color: var(--prism-border);
    }

    .prism-action-btn--subtle:hover .material-symbols-outlined {
      color: var(--prism-accent);
    }
  </style>
</body>

</html>
