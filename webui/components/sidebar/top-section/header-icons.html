<html>
<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
  </script>
</head>
<body>
  <div class="prism-sidebar-header" x-data>
    <!-- Sidebar Toggle Button -->
    <button id="toggle-sidebar" class="prism-sidebar-toggle" @click="$store.sidebar.toggle()" aria-label="Toggle Sidebar" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="CurrentColor">
        <path d="M3 13h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V7H3v2z"></path>
      </svg>
    </button>

    <!-- Korev Evidence Logo + Status -->
    <div class="prism-sidebar-brand">
      <div class="prism-sidebar-logo">
        <img src="./public/korev-evidence-logo.svg" alt="Korev Evidence" width="34" height="34" class="prism-sidebar-logo-img prism-sidebar-logo-img--dark" />
        <img src="./public/korev-evidence-logo-light.svg" alt="Korev Evidence" width="34" height="34" class="prism-sidebar-logo-img prism-sidebar-logo-img--light" />
      </div>
      <div class="prism-sidebar-brand-info">
        <span class="prism-sidebar-brand-name">KOREV</span>
        <span class="prism-sidebar-brand-module">Evidence</span>
        <div class="prism-status prism-status--online">
          <span class="prism-status-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM SIDEBAR HEADER
     * ═══════════════════════════════════════════════════════════════════════ */
    .prism-sidebar-header {
      display: flex;
      align-items: center;
      gap: var(--prism-space-3);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1004;
      padding: var(--prism-space-4);
      width: 250px;
      background: var(--prism-bg-surface);
      border-bottom: 1px solid var(--prism-border-subtle);
    }

    .prism-sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--prism-bg-surface-2);
      border: 1px solid var(--prism-border);
      border-radius: var(--prism-radius-sm);
      color: var(--prism-text-secondary);
      cursor: pointer;
      transition: all var(--prism-transition-fast);
      flex-shrink: 0;
    }

    .prism-sidebar-toggle:hover {
      background: var(--prism-bg-elevated);
      color: var(--prism-text-primary);
      border-color: var(--prism-border-strong);
    }

    .prism-sidebar-toggle:focus-visible {
      outline: none;
      box-shadow: var(--prism-focus-ring);
    }

    .prism-sidebar-toggle:active {
      transform: scale(0.95);
    }

    /* Brand Section */
    .prism-sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--prism-space-3);
    }

    .prism-sidebar-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .prism-sidebar-logo-img {
      width: 34px;
      height: 34px;
      opacity: 0.9;
    }
    /* Important: do NOT invert the Korev Evidence logo.
       The provided SVG already encodes correct colors (black bg, white mark). */
    .prism-sidebar-logo-img {
      filter: none;
    }
    .prism-sidebar-logo-img--light {
      display: none;
    }
    [data-theme="light"] .prism-sidebar-logo-img--dark {
      display: none;
    }
    [data-theme="light"] .prism-sidebar-logo-img--light {
      display: block;
    }
    .light-mode .prism-sidebar-logo-img--dark {
      display: none;
    }
    .light-mode .prism-sidebar-logo-img--light {
      display: block;
    }

    .prism-sidebar-brand-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .prism-sidebar-brand-name {
      font-size: var(--prism-text-sm);
      font-weight: 600;
      color: var(--prism-text-primary);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .prism-sidebar-brand-module {
      font-size: 10px;
      font-weight: 500;
      color: var(--prism-text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* Status Badge (reusing design system) */
    .prism-sidebar-header .prism-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--prism-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .prism-sidebar-header .prism-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--prism-accent);
      animation: prism-pulse 2s ease-in-out infinite;
    }

    .prism-sidebar-header .prism-status--offline .prism-status-dot {
      background: var(--prism-text-muted);
      animation: none;
    }

    @keyframes prism-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .prism-sidebar-header {
        width: 250px;
      }
    }
  </style>
</body>
</html>
