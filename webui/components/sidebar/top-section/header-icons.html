<html>
<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
  </script>
</head>
<body>
  <!-- Floating toggle — always visible, even when sidebar is closed -->
  <button id="toggle-sidebar" class="prism-sidebar-toggle-float" x-data
          :class="{ 'prism-sidebar-toggle-float--shifted': $store.sidebar.isOpen }"
          @click="$store.sidebar.toggle()" aria-label="Toggle Sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 13h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V7H3v2z"></path>
    </svg>
  </button>

  <!-- Brand header — only visible when sidebar is open -->
  <div class="prism-sidebar-header" x-data :class="{ 'prism-sidebar-header--hidden': !$store.sidebar.isOpen }">
    <!-- KOREV Evidence Logo + Status -->
    <div class="prism-sidebar-brand">
      <div class="prism-sidebar-logo">
        <img src="./public/korev-evidence-logo-prism.png" alt="KOREV Evidence" width="34" height="34" class="prism-sidebar-logo-img" />
      </div>
      <div class="prism-sidebar-brand-info">
        <div class="prism-sidebar-brand-title">
          <span class="prism-sidebar-brand-name">KOREV</span>
          <span class="prism-sidebar-brand-evidence">Evidence</span>
        </div>
        <div class="prism-status prism-status--online">
          <span class="prism-status-dot"></span>
          <span>Online</span>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM SIDEBAR HEADER
     * ═══════════════════════════════════════════════════════════════════════ */
    /* ── FLOATING TOGGLE — always accessible ────────────────────────── */
    .prism-sidebar-toggle-float {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 1005;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--prism-bg-surface-2);
      border: 1px solid var(--prism-border);
      border-radius: var(--prism-radius-sm);
      color: var(--prism-text-secondary);
      cursor: pointer;
      transition: all var(--transition-speed, 0.3s) ease-in-out;
      flex-shrink: 0;
    }

    .prism-sidebar-toggle-float:hover {
      background: var(--prism-bg-elevated);
      color: var(--prism-text-primary);
      border-color: var(--prism-border-strong);
    }

    .prism-sidebar-toggle-float:focus-visible {
      outline: none;
      box-shadow: var(--prism-focus-ring);
    }

    .prism-sidebar-toggle-float:active {
      transform: scale(0.95);
    }

    /* When sidebar is open, shift the toggle to its original position inside the header */
    .prism-sidebar-toggle-float--shifted {
      /* No change needed — stays at left:14px which aligns with sidebar padding */
    }

    /* ── BRAND HEADER — slides with sidebar ──────────────────────── */
    .prism-sidebar-header {
      display: flex;
      align-items: center;
      gap: var(--prism-space-3);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1004;
      /* Leave room for the floating toggle */
      padding: var(--prism-space-4);
      padding-left: 60px;
      width: 250px;
      background: var(--prism-bg-surface);
      border-bottom: 1px solid var(--prism-border-subtle);
      transition: transform var(--transition-speed, 0.3s) ease-in-out;
    }

    .prism-sidebar-header--hidden {
      transform: translateX(-250px);
    }

    /* Brand Section */
    .prism-sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--prism-space-3);
    }

    .prism-sidebar-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .prism-sidebar-logo-img {
      width: 34px;
      height: 34px;
    }
    /* Important: do NOT invert the KOREV Evidence logo.
       Le prisme argenté (PNG détouré) fonctionne sur les deux thèmes. */
    .prism-sidebar-logo-img {
      filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.35));
    }

    .prism-sidebar-brand-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .prism-sidebar-brand-title {
      display: flex;
      align-items: baseline;
      gap: 4px;
      line-height: 1;
    }

    .prism-sidebar-brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--prism-text-primary);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .prism-sidebar-brand-evidence {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      font-weight: 400;
      font-style: italic;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.01em;
      line-height: 1;
    }

    /* Status Badge (reusing design system) */
    .prism-sidebar-header .prism-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--prism-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .prism-sidebar-header .prism-status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--prism-accent);
      animation: prism-pulse 2s ease-in-out infinite;
    }

    .prism-sidebar-header .prism-status--offline .prism-status-dot {
      background: var(--prism-text-muted);
      animation: none;
    }

    @keyframes prism-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .prism-sidebar-header {
        width: 250px;
      }
    }
  </style>
</body>
</html>
