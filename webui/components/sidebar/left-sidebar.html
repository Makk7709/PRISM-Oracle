<html>

<head>
  <script type="module">
    import { store as sidebarStore } from "/components/sidebar/sidebar-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.sidebar">
      <div id="left-panel" class="panel prism-sidebar" x-data :class="{'hidden': !$store.sidebar.isOpen}">
        <!-- Sidebar upper elements -->
        <div class="prism-sidebar__top">
          <!-- Top Section: Header Icons + Quick Actions -->
          <x-component path="sidebar/top-section/sidebar-top.html"></x-component>
          
          <!-- Chats List -->
          <div class="prism-sidebar__section" id="chats-section">
            <x-component path="sidebar/chats/chats-list.html"></x-component>
          </div>

          <!-- Tasks List -->
          <div class="prism-sidebar__section" id="tasks-section">
            <x-component path="sidebar/tasks/tasks-list.html"></x-component>
          </div>
        </div>
        
        <!-- Sidebar lower elements -->
        <div class="prism-sidebar__bottom">
          <x-component path="sidebar/bottom/sidebar-bottom.html"></x-component>
        </div>
      </div>
    </template>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM SIDEBAR — Premium, minimal, identifiable
     * ═══════════════════════════════════════════════════════════════════════ */
    
    .prism-sidebar {
      background: var(--prism-glass-bg);
      backdrop-filter: blur(var(--prism-glass-blur));
      -webkit-backdrop-filter: blur(var(--prism-glass-blur));
      border-right: 1px solid var(--prism-glass-border);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all var(--transition-speed) ease-in-out;
      width: 250px;
      min-width: 250px;
      color: var(--prism-text-primary);
      box-shadow: var(--prism-shadow-glow-violet);
      user-select: none;
      -webkit-user-select: none;
      height: 100vh;
      overflow: hidden;
    }

    @supports not (backdrop-filter: blur(1px)) {
      .prism-sidebar {
        background: var(--prism-bg-surface);
      }
    }

    .prism-sidebar.hidden {
      margin-left: -250px;
    }

    /* Top Section */
    .prism-sidebar__top {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      justify-content: flex-start;
      margin-top: 4.5rem; /* Space for fixed header */
      padding: var(--prism-space-4);
      gap: var(--prism-space-2);
      scrollbar-width: thin;
      scrollbar-color: var(--prism-border) transparent;
    }

    .prism-sidebar__top::-webkit-scrollbar {
      width: 0;
    }

    /* Bottom Section */
    .prism-sidebar__bottom {
      position: relative;
      flex-shrink: 0;
      flex-grow: 0;
      border-top: 1px solid var(--prism-glass-border);
    }

    /* Section containers */
    .prism-sidebar__section {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #chats-section {
      flex: 1 1 auto;
      min-height: 150px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    #tasks-section {
      flex: 0 0 auto;
      max-height: 40%;
      margin-top: 0;
      padding-top: var(--prism-space-4);
      overflow: hidden;
    }

    /* Flatten wrapper elements for flex chain */
    #chats-section > x-component,
    #chats-section > x-component > div[x-data],
    #tasks-section > x-component,
    #tasks-section > x-component > div[x-data],
    #tasks-section > x-component > div[x-data] > div[x-data] {
      display: contents;
    }

    /* Bootstrap collapse handling */
    #tasks-section .collapse {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    #tasks-section .collapsing {
      flex: 0 0 auto !important;
    }

    /* Section Header (Chats, Tasks) */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin: 0 0 var(--prism-space-3) 0;
      padding: 0;
      user-select: none;
      font-size: var(--prism-text-sm);
    }

    .section-header-collapsible {
      cursor: pointer;
    }

    /* ─────────────────────────────────────────────────────────────────────
     * RESPONSIVE
     * ───────────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .prism-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 250px !important;
        min-width: 250px;
        z-index: 1003;
        transition: all var(--transition-speed) ease-in-out;
      }

      .prism-sidebar.hidden {
        margin-left: -250px;
      }
    }

    @media (max-height: 600px) {
      #chats-section {
        min-height: 100%;
      }

      .prism-sidebar__top {
        overflow-y: auto;
        scroll-behavior: smooth;
      }
    }
  </style>
</body>

</html>
