<html>
<head>
  <script type="module">
    import "/components/sidebar/bottom/sidebar-bottom-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.sidebarBottom">
      <div class="prism-sidebar-bottom">
        <!-- Preferences Panel -->
        <x-component path="sidebar/bottom/preferences/preferences-panel.html"></x-component>
        
        <!-- User & Logout -->
        <div class="prism-session-bar">
          <div class="prism-session-user">
            <svg class="prism-session-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="5" r="2.8" stroke="currentColor" stroke-width="1.3"/>
              <path d="M2.5 14c0-2.8 2.5-5 5.5-5s5.5 2.2 5.5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <span class="prism-session-name" x-text="$store.sidebarBottom.userName || ''"></span>
          </div>
          <div class="prism-session-actions">
            <button class="prism-password-btn" @click="openModal('account/password-modal.html')" title="Changer le mot de passe">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <circle cx="5" cy="11" r="3" stroke="currentColor" stroke-width="1.3"/>
                <path d="M7.2 8.8L13.5 2.5M11 5l2 2M9 7l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="prism-logout-btn" @click="$store.sidebarBottom.logout()" title="Se déconnecter">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M6 2H4a2 2 0 00-2 2v8a2 2 0 002 2h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                <path d="M10.5 11.5L14 8l-3.5-3.5M6 8h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Version Info -->
        <div class="prism-version-info">
          <span class="prism-version-label" x-text="$store.sidebarBottom.versionLabel"></span>
        </div>
      </div>
    </template>
  </div>


  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM SIDEBAR BOTTOM
     * ═══════════════════════════════════════════════════════════════════════ */
    .prism-sidebar-bottom {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Session Bar */
    .prism-session-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 var(--prism-space-4);
      padding: var(--prism-space-3) 0;
      border-top: 1px solid var(--prism-border-subtle);
    }

    .prism-session-user {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .prism-session-icon {
      flex-shrink: 0;
      color: var(--prism-text-muted);
      opacity: 0.7;
    }

    .prism-session-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--prism-text-secondary);
      letter-spacing: 0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: capitalize;
    }

    .prism-session-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .prism-logout-btn,
    .prism-password-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--prism-text-muted);
      cursor: pointer;
      transition: all 0.15s ease;
      opacity: 0.6;
    }

    .prism-logout-btn:hover {
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      opacity: 1;
    }

    .prism-password-btn:hover {
      background: rgba(99, 102, 241, 0.12);
      color: #818cf8;
      opacity: 1;
    }

    /* Version Info */
    .prism-version-info {
      position: relative;
      margin: 0 var(--prism-space-4) var(--prism-space-4) var(--prism-space-4);
      padding-top: var(--prism-space-2);
    }

    .prism-version-label {
      color: var(--prism-text-muted);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      user-select: all;
      opacity: 0.7;
    }
  </style>
</body>
</html>
