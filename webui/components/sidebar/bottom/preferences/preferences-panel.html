<html>
<head>
  <script type="module">
    import { store } from "/components/sidebar/bottom/preferences/preferences-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.preferences">
      <div class="prism-preferences">
        <div class="prism-section-header prism-section-header--collapsible"
             data-bs-toggle="collapse"
             @click="$store.sidebar.toggleSection('preferences')"
             x-effect="!$store.sidebar.isSectionOpen('preferences') ? $el.classList.add('collapsed') : $el.classList.remove('collapsed')">
          <div class="prism-section-header__left">
            <span class="material-symbols-outlined prism-section-icon">tune</span>
            <h3 class="prism-section-title">Preferences</h3>
          </div>
          <svg class="prism-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M8 4l8 8-8 8" />
          </svg>
        </div>
        
        <ul class="prism-preferences-list collapse" id="preferences-collapse"
            x-effect="(() => { const c = bootstrap.Collapse.getOrCreateInstance($el, { toggle: false }); $store.sidebar.isSectionOpen('preferences') ? c.show() : c.hide(); })()">
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Autoscroll</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.autoScroll">
              <span class="prism-switch__track"></span>
            </label>
          </li>
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Dark mode</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.darkMode">
              <span class="prism-switch__track"></span>
            </label>
          </li>
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Speech</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.speech">
              <span class="prism-switch__track"></span>
            </label>
          </li>
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Show thoughts</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.showThoughts">
              <span class="prism-switch__track"></span>
            </label>
          </li>
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Show JSON</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.showJson">
              <span class="prism-switch__track"></span>
            </label>
          </li>
          <li class="prism-preference-item" x-data>
            <span class="prism-preference-label">Show utility messages</span>
            <label class="prism-switch">
              <input type="checkbox" x-model="$store.preferences.showUtils">
              <span class="prism-switch__track"></span>
            </label>
          </li>
        </ul>
      </div>
    </template>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * PRISM PREFERENCES PANEL
     * ═══════════════════════════════════════════════════════════════════════ */
    .prism-preferences {
      font-size: var(--prism-text-sm);
      padding: var(--prism-space-3) var(--prism-space-4);
    }

    /* Section Header */
    .prism-preferences .prism-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--prism-space-2) 0;
      margin-bottom: var(--prism-space-2);
      border: none;
    }

    .prism-preferences .prism-section-header--collapsible {
      cursor: pointer;
      user-select: none;
    }

    .prism-preferences .prism-section-header__left {
      display: flex;
      align-items: center;
      gap: var(--prism-space-2);
    }

    .prism-preferences .prism-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--prism-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0;
    }

    .prism-preferences .prism-section-icon {
      font-size: 14px;
      color: var(--prism-text-muted);
      opacity: 0.6;
    }

    /* Chevron rotation */
    .prism-chevron {
      color: var(--prism-text-muted);
      transition: transform var(--prism-transition-fast);
      transform: rotate(90deg);
    }

    .prism-section-header.collapsed .prism-chevron {
      transform: rotate(0deg);
    }

    /* Preferences List */
    .prism-preferences-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .prism-preference-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--prism-space-2) 0;
      border-top: 1px solid var(--prism-border-subtle);
    }

    .prism-preference-item:first-child {
      border-top: none;
    }

    .prism-preference-label {
      font-size: var(--prism-text-xs);
      color: var(--prism-text-secondary);
    }

    /* PRISM Switch */
    .prism-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .prism-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .prism-switch__track {
      position: absolute;
      inset: 0;
      background: var(--prism-bg-elevated);
      border: 1px solid var(--prism-border);
      border-radius: 10px;
      transition: all var(--prism-transition-fast);
    }

    .prism-switch__track::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      bottom: 2px;
      background: var(--prism-text-muted);
      border-radius: 50%;
      transition: all var(--prism-transition-fast);
    }

    .prism-switch input:checked + .prism-switch__track {
      background: var(--prism-accent-subtle);
      border-color: var(--prism-accent);
    }

    .prism-switch input:checked + .prism-switch__track::before {
      transform: translateX(16px);
      background: var(--prism-accent);
    }

    .prism-switch input:focus-visible + .prism-switch__track {
      box-shadow: var(--prism-focus-ring);
    }
  </style>
</body>
</html>
