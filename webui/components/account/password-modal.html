<html>
<head>
  <title>Changer le mot de passe</title>
  <script type="module">
    import "/components/account/password-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.passwordModal">
      <form class="pwm-form" @submit.prevent="$store.passwordModal.submit()">

        <p class="pwm-intro">
          Choisissez un nouveau mot de passe d'au moins 12 caractères,
          contenant au moins une lettre et un chiffre.
        </p>

        <div class="pwm-field">
          <label for="pwm-current">Mot de passe actuel</label>
          <input
            type="password"
            id="pwm-current"
            autocomplete="current-password"
            x-model="$store.passwordModal.currentPassword"
            :disabled="$store.passwordModal.loading"
            placeholder="Votre mot de passe actuel"
          />
        </div>

        <div class="pwm-field">
          <label for="pwm-new">Nouveau mot de passe</label>
          <input
            type="password"
            id="pwm-new"
            autocomplete="new-password"
            x-model="$store.passwordModal.newPassword"
            :disabled="$store.passwordModal.loading"
            placeholder="Au moins 12 caractères, lettre + chiffre"
          />
          <p class="pwm-hint"
             :class="{ 'pwm-hint--ok': $store.passwordModal.policyOk }"
             x-show="$store.passwordModal.newPassword.length > 0">
            <span x-text="$store.passwordModal.policyOk ? '✓ Robustesse suffisante' : '12 caractères minimum, au moins une lettre et un chiffre'"></span>
          </p>
        </div>

        <div class="pwm-field">
          <label for="pwm-confirm">Confirmer le nouveau mot de passe</label>
          <input
            type="password"
            id="pwm-confirm"
            autocomplete="new-password"
            x-model="$store.passwordModal.confirmPassword"
            :disabled="$store.passwordModal.loading"
            placeholder="Retapez le nouveau mot de passe"
          />
          <p class="pwm-hint pwm-hint--error"
             x-show="$store.passwordModal.confirmPassword.length > 0 && !$store.passwordModal.confirmOk">
            La confirmation ne correspond pas.
          </p>
        </div>

        <p class="pwm-message pwm-message--error"
           x-show="$store.passwordModal.error"
           x-text="$store.passwordModal.error"></p>
        <p class="pwm-message pwm-message--success"
           x-show="$store.passwordModal.success"
           x-text="$store.passwordModal.success"></p>

        <button type="submit" class="pwm-submit" :disabled="$store.passwordModal.loading">
          <span x-show="!$store.passwordModal.loading">Mettre à jour le mot de passe</span>
          <span x-show="$store.passwordModal.loading">Mise à jour…</span>
        </button>

      </form>
    </template>
  </div>

  <style>
    .pwm-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 0.25rem 0.1rem;
      max-width: 440px;
    }

    .pwm-intro {
      font-size: 0.85rem;
      color: var(--color-text-secondary, #9494a0);
      line-height: 1.5;
      margin: 0;
    }

    .pwm-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .pwm-field label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-secondary, #9494a0);
    }

    .pwm-field input {
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--color-border, rgba(255, 255, 255, 0.1));
      border-radius: 8px;
      background: var(--color-background-input, rgba(255, 255, 255, 0.04));
      color: var(--color-text, inherit);
      font-size: 0.9rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .pwm-field input:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.55);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .pwm-hint {
      font-size: 0.75rem;
      color: var(--color-text-secondary, #9494a0);
      margin: 0;
    }

    .pwm-hint--ok {
      color: #34d399;
    }

    .pwm-hint--error {
      color: #f87171;
    }

    .pwm-message {
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      margin: 0;
    }

    .pwm-message--error {
      color: #f87171;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.18);
    }

    .pwm-message--success {
      color: #34d399;
      background: rgba(52, 211, 153, 0.08);
      border: 1px solid rgba(52, 211, 153, 0.18);
    }

    .pwm-submit {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .pwm-submit:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .pwm-submit:disabled {
      opacity: 0.6;
      cursor: wait;
    }
  </style>
</body>
</html>
