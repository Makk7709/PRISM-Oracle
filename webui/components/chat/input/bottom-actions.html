<html>
<head>
  <script type="module">
    import { store } from "/components/chat/input/input-store.js";
    import { store as historyStore } from "/components/modals/history/history-store.js";
    import { store as contextStore } from "/components/modals/context/context-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.chatInput">
      <div class="korev-actions-bar">
        
        <!-- Pause/Resume -->
        <button class="korev-action-btn" @click="$store.chatInput.pauseAgent(!$store.chatInput.paused)">
          <template x-if="!$store.chatInput.paused">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </template>
          <template x-if="$store.chatInput.paused">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </template>
          <span x-text="$store.chatInput.paused ? 'Resume Agent' : 'Pause Agent'"></span>
        </button>

        <!-- Separator -->
        <div class="korev-action-separator"></div>

        <!-- Import Knowledge -->
        <button class="korev-action-btn" @click="$store.chatInput.loadKnowledge()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Import knowledge</span>
        </button>

        <!-- Files -->
        <button class="korev-action-btn" id="work_dir_browser" @click="$store.chatInput.browseFiles()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Files</span>
        </button>

        <!-- History -->
        <button class="korev-action-btn" id="history_inspect" @click="$store.history.open()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>History</span>
        </button>

        <!-- Context -->
        <button class="korev-action-btn" id="ctx_window" @click="$store.context.open()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          <span>Context</span>
        </button>

        <!-- Nudge -->
        <button class="korev-action-btn" id="nudges_window" @click="$store.chatInput.nudge()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span>Nudge</span>
        </button>

      </div>
    </template>
  </div>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * KOREV ACTIONS BAR — Minimal, sovereign
     * ═══════════════════════════════════════════════════════════════════════ */
    
    .korev-actions-bar {
      display: flex;
      align-items: center;
      gap: var(--prism-space-1);
      width: 100%;
      padding: var(--prism-space-2) 0 0 0;
      margin-left: var(--prism-space-1);
    }

    /* Action Button */
    .korev-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: transparent;
      border: none;
      border-radius: var(--prism-radius-sm);
      color: var(--prism-text-muted);
      font-family: var(--prism-font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: all var(--prism-transition-fast);
      white-space: nowrap;
    }

    .korev-action-btn:hover {
      color: var(--prism-text-primary);
      background: var(--prism-bg-surface-2);
    }

    .korev-action-btn:active {
      opacity: 0.7;
    }

    .korev-action-btn svg {
      flex-shrink: 0;
      opacity: 0.8;
    }

    .korev-action-btn:hover svg {
      opacity: 1;
    }

    .korev-action-btn span {
      margin: 0;
    }

    /* Separator */
    .korev-action-separator {
      width: 1px;
      height: 16px;
      background: var(--prism-border-subtle);
      margin: 0 var(--prism-space-2);
    }

    /* ─────────────────────────────────────────────────────────────────────
     * LIGHT MODE
     * ───────────────────────────────────────────────────────────────────── */
    .light-mode .korev-action-btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    /* ─────────────────────────────────────────────────────────────────────
     * RESPONSIVE
     * ───────────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .korev-actions-bar {
        flex-wrap: wrap;
        gap: var(--prism-space-1);
      }

      .korev-action-separator {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .korev-action-btn span {
        display: none;
      }

      .korev-action-btn {
        padding: 8px;
      }

      .korev-action-btn svg {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</body>
</html>
