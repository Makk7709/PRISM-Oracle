<html>
<head>
    <script type="module">
        import { store as speechStore } from "/components/chat/speech/speech-store.js";
        import { store as attachmentsStore } from "/components/chat/attachments/attachmentsStore.js";
        import { store as fullScreenStore } from "/components/modals/full-screen-input/full-screen-store.js";
    </script>
</head>
<body>
    <div class="korev-input-row">
        <!-- Attachment icon -->
        <div class="korev-attachment-wrapper" x-data="{ showTooltip: false }">
            <label for="file-input" class="korev-attachment-icon" @mouseover="showTooltip = true" @mouseleave="showTooltip = false">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </label>
            <input type="file" id="file-input" accept="*" multiple style="display: none" @change="$store.chatAttachments.handleFileUpload($event)">
            <div x-show="showTooltip" class="korev-tooltip" x-cloak>Joindre des fichiers</div>
        </div>

        <!-- Input container -->
        <div class="korev-input-container">
            <textarea id="chat-input" 
                      class="korev-textarea"
                      placeholder="Type your message here..." 
                      rows="1"
                      @keydown.enter="if (!$event.shiftKey && !$event.isComposing && $event.keyCode !== 229) { $event.preventDefault(); $store.chatInput.sendMessage(); }"
                      @input="$store.chatInput.adjustTextareaHeight()"></textarea>
            <button class="korev-expand-btn" @click="$store.fullScreenInputModal.openModal()" aria-label="Expand input">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <line x1="21" y1="3" x2="14" y2="10"></line>
                    <line x1="3" y1="21" x2="10" y2="14"></line>
                </svg>
            </button>
        </div>

        <!-- Action buttons -->
        <div class="korev-buttons-wrapper">
            <!-- Send button -->
            <button class="korev-send-btn" id="send-button" aria-label="Send message"
                    @click="$store.chatInput.sendMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>

            <!-- Microphone button -->
            <button class="korev-mic-btn" id="microphone-button" aria-label="Start/Stop recording"
                    @click="$store.speech.handleMicrophoneClick()" x-effect="$store.speech.updateMicrophoneButtonUI()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Full Screen Input Modal -->
    <x-component path="modals/full-screen-input/full-screen-input.html"></x-component>

    <style>
    /* ═══════════════════════════════════════════════════════════════════════
     * KOREV CHAT INPUT — Sovereign, minimal, premium
     * ═══════════════════════════════════════════════════════════════════════ */
    
    .korev-input-row {
        display: flex;
        align-items: center;
        gap: var(--prism-space-3);
        width: 100%;
    }

    /* ─────────────────────────────────────────────────────────────────────
     * ATTACHMENT
     * ───────────────────────────────────────────────────────────────────── */
    .korev-attachment-wrapper {
        position: relative;
        flex-shrink: 0;
    }

    .korev-attachment-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: var(--prism-radius-md);
        background: transparent;
        color: var(--prism-text-muted);
        cursor: pointer;
        transition: all var(--prism-transition-fast);
        border: 1px solid transparent;
    }

    .korev-attachment-icon:hover {
        color: var(--prism-text-primary);
        background: var(--prism-bg-surface-2);
        border-color: var(--prism-border);
    }

    .korev-tooltip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 10px;
        background: var(--prism-bg-elevated);
        color: var(--prism-text-primary);
        font-size: 11px;
        font-weight: 500;
        border-radius: var(--prism-radius-sm);
        white-space: nowrap;
        border: 1px solid var(--prism-border);
        box-shadow: var(--prism-shadow-soft);
        z-index: 1002;
    }

    /* ─────────────────────────────────────────────────────────────────────
     * TEXT INPUT
     * ───────────────────────────────────────────────────────────────────── */
    .korev-input-container {
        position: relative;
        flex: 1;
        min-width: 0;
    }

    .korev-textarea {
        width: 100%;
        min-height: 48px;
        max-height: 150px;
        padding: 14px 44px 14px 16px;
        background: var(--prism-bg-surface-2);
        border: 1px solid var(--prism-border);
        border-radius: var(--prism-radius-lg);
        color: var(--prism-text-primary);
        font-family: var(--korev-font-elegant, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, sans-serif);
        font-size: 15px;
        line-height: 1.6;
        letter-spacing: 0.01em;
        resize: none;
        transition: all var(--prism-transition-fast);
        overflow-y: auto;
    }

    .korev-textarea:focus {
        outline: none;
        border-color: var(--prism-accent);
        background: var(--prism-bg-surface);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .korev-textarea::placeholder {
        color: var(--prism-text-muted);
        opacity: 0.6;
        font-family: var(--korev-font-elegant, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, sans-serif);
        font-style: normal;
    }

    /* Scrollbar */
    .korev-textarea::-webkit-scrollbar {
        width: 4px;
    }

    .korev-textarea::-webkit-scrollbar-track {
        background: transparent;
    }

    .korev-textarea::-webkit-scrollbar-thumb {
        background: var(--prism-border);
        border-radius: 2px;
    }

    /* Expand button */
    .korev-expand-btn {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        background: transparent;
        border: none;
        border-radius: var(--prism-radius-sm);
        color: var(--prism-text-muted);
        cursor: pointer;
        transition: all var(--prism-transition-fast);
        opacity: 0.5;
    }

    .korev-expand-btn:hover {
        opacity: 1;
        color: var(--prism-text-primary);
        background: var(--prism-bg-elevated);
    }

    /* ─────────────────────────────────────────────────────────────────────
     * ACTION BUTTONS
     * ───────────────────────────────────────────────────────────────────── */
    .korev-buttons-wrapper {
        display: flex;
        gap: var(--prism-space-2);
        flex-shrink: 0;
    }

    /* Send button - Primary accent */
    .korev-send-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: var(--prism-accent);
        border: none;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        transition: all var(--prism-transition-fast);
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .korev-send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .korev-send-btn:active {
        transform: scale(0.98);
    }

    /* Microphone button - Secondary */
    .korev-mic-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        background: var(--prism-bg-surface-2);
        border: 1px solid var(--prism-border);
        border-radius: 50%;
        color: var(--prism-text-secondary);
        cursor: pointer;
        transition: all var(--prism-transition-fast);
    }

    .korev-mic-btn:hover {
        background: var(--prism-bg-elevated);
        color: var(--prism-text-primary);
        border-color: var(--prism-border-strong);
    }

    .korev-mic-btn:active {
        transform: scale(0.98);
    }

    /* Mic active state (recording) */
    .korev-mic-btn.mic-active,
    #microphone-button.mic-active {
        background: #ef4444;
        border-color: #ef4444;
        color: white;
        animation: korev-pulse 1.5s ease-in-out infinite;
    }

    @keyframes korev-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    }

    /* ─────────────────────────────────────────────────────────────────────
     * LIGHT MODE
     * ───────────────────────────────────────────────────────────────────── */
    .light-mode .korev-textarea {
        background: var(--prism-bg-surface);
    }

    .light-mode .korev-textarea:focus {
        background: white;
    }

    .light-mode .korev-send-btn {
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
    }

    .light-mode .korev-send-btn:hover {
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    /* ─────────────────────────────────────────────────────────────────────
     * RESPONSIVE
     * ───────────────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
        .korev-input-row {
            gap: var(--prism-space-2);
        }

        .korev-textarea {
            min-height: 44px;
            padding: 12px 40px 12px 14px;
            font-size: 16px; /* Prevent zoom on iOS */
        }

        .korev-send-btn,
        .korev-mic-btn {
            width: 40px;
            height: 40px;
        }

        .korev-attachment-icon {
            width: 36px;
            height: 36px;
        }
    }
    </style>
</body>
</html>
