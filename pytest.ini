[pytest]
# PRISM + Oracle Deep Verification Test Suite Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    fast: Fast tests for CI gate (~2-10s)
    integration: Integration tests
    e2e: End-to-end scenario tests
    property: Property-based invariant tests
    security: Security-related tests
    slow: Slow tests excluded from fast gate
    redis: Tests requiring Redis server (auto-skip if unavailable)

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Async support
asyncio_mode = auto

# Timeouts (in seconds)
timeout = 30
timeout_method = thread

# Coverage (optional, if pytest-cov installed)
# addopts = --cov=python/helpers --cov-report=term-missing

# ═══════════════════════════════════════════════════════════════════════════════
# CI GATES — MANDATORY FOR MERGE TO MAIN
# ═══════════════════════════════════════════════════════════════════════════════
# 
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ SECURITY GATE (REQUIRED - BLOCKING)                                         │
# │                                                                             │
# │ 1. All security tests:                                                      │
# │    pytest tests/security/ -q                                                │
# │                                                                             │
# │ 2. Rate limit coverage (95% min):                                           │
# │    pytest tests/security/test_rate_limit*.py tests/security/test_ip.py \   │
# │           --cov=python/security/rate_limit --cov-fail-under=95              │
# │                                                                             │
# │ 3. E2E login rate limit (proves run_ui.py integration):                     │
# │    pytest tests/security/test_login_rate_limit_e2e.py -v                    │
# │                                                                             │
# │ 4. Redis multi-worker tests (REQUIRES REDIS SERVICE IN CI):                 │
# │    pytest tests/security/test_rate_limit_redis.py -v -m redis               │
# │                                                                             │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# CI REQUIREMENTS (GitHub Actions):
#   - Redis service: redis:7 (for multi-worker proof)
#   - Branch protection: PR required + review before merge to main
#   - Status checks: All security tests must pass
#
# FAST GATE (~2-10 seconds):
#   pytest tests/test_prism_contract.py tests/test_prism_tally_quorum.py -q
#
# FULL GATE (all tests):
#   pytest -q
#
# Specific test files:
#   pytest tests/test_prism_timeouts.py -v
#   pytest tests/test_oracle_prism_integration.py -v
#   pytest tests/e2e/ -v
#   pytest tests/property/ -v
#   pytest tests/security/ -v
#
# ═══════════════════════════════════════════════════════════════════════════════

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
