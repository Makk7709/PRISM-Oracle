[pytest]
# PRISM + Oracle Deep Verification Test Suite Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    fast: Fast tests for CI gate (~2-10s)
    integration: Integration tests
    e2e: End-to-end scenario tests
    property: Property-based invariant tests
    security: Security-related tests
    slow: Slow tests excluded from fast gate

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Async support
asyncio_mode = auto

# Timeouts (in seconds)
timeout = 30
timeout_method = thread

# Coverage (optional, if pytest-cov installed)
# addopts = --cov=python/helpers --cov-report=term-missing

# ═══════════════════════════════════════════════════════════════════════════════
# CI GATES
# ═══════════════════════════════════════════════════════════════════════════════
# 
# FAST GATE (~2-10 seconds):
#   pytest tests/test_prism_contract.py tests/test_prism_tally_quorum.py -q
#
# SECURITY GATE (Phase 1 P0) - MANDATORY for CI:
#   pytest tests/security/ -v -m "not integration"
#   pytest tests/security/ --cov=python/security --cov-fail-under=90
#
# FULL GATE (all tests):
#   pytest -q
#
# Specific test files:
#   pytest tests/test_prism_timeouts.py -v
#   pytest tests/test_oracle_prism_integration.py -v
#   pytest tests/e2e/ -v
#   pytest tests/property/ -v
#   pytest tests/security/ -v
#
# ═══════════════════════════════════════════════════════════════════════════════

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
