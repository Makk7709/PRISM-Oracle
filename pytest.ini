[pytest]
# Configuration pytest pour Korev Oracle
# Compatible Python 3.9+

# Mode asyncio automatique pour pytest-asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers personnalisés
markers =
    asyncio: mark test as async
    slow: mark test as slow (deselect with '-m "not slow"')
    replay: mark test as replay harness test
    invariant: mark test that verifies invariants (I1, I2, I4)
    integration: mark test as integration test
    network_guard: tests related to network guard

# Options par défaut
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Filtrer les warnings non critiques
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ============================================================================
# CI GATES — EXPLICIT FILE LISTS
# ============================================================================
#
# FAST GATE (PR, ~2-5s):
#   pytest -q tests/test_reasoning_engine.py \
#             tests/test_task_planner.py \
#             tests/test_metacognition.py \
#             tests/test_metacognition_policy.py \
#             tests/test_harness_integrity.py \
#             tests/test_no_bypass_litellm.py
#
# FULL GATE (main/nightly, ~200s):
#   pytest -q tests/test_reasoning_engine.py \
#             tests/test_task_planner.py \
#             tests/test_metacognition.py \
#             tests/test_metacognition_policy.py \
#             tests/test_harness_integrity.py \
#             tests/test_no_bypass_litellm.py \
#             tests/test_replay_harness.py
#
# RATIONALE:
# - Explicit file lists prevent new slow tests from sneaking into FAST gate
# - test_replay_harness.py is the ONLY file in FULL but not FAST
# - Any new test file must be explicitly added to the appropriate gate
# ============================================================================
