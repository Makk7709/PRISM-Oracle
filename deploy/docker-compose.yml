# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                  KOREV EVIDENCE — Docker Compose (Production)                ║
# ║                                                                              ║
# ║  Architecture : Caddy (reverse proxy HTTPS) → Flask (backend + WebUI)        ║
# ║  Tout le trafic passe par Caddy. Flask n'est PAS exposé directement.        ║
# ║                                                                              ║
# ║  Utilisation :                                                               ║
# ║    1. Copier .env.example vers .env et configurer                            ║
# ║    2. docker compose build                                                   ║
# ║    3. docker compose up -d                                                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # EVIDENCE BACKEND (Flask + WebUI + MCP servers)
  # ═══════════════════════════════════════════════════════════════════════════
  evidence-backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      args:
        BUILD_DATE: "${BUILD_DATE:-}"
        GIT_COMMIT: "${GIT_COMMIT:-}"
        EVIDENCE_VERSION: "${EVIDENCE_VERSION:-1.0.0}"
    image: korev/evidence-backend:${EVIDENCE_VERSION:-latest}
    container_name: evidence-backend
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    # Le backend n'est PAS exposé sur le réseau hôte.
    # Tout passe par Caddy via le réseau Docker interne.
    # Décommentez la ligne suivante UNIQUEMENT pour le debug :
    # ports:
    #   - "127.0.0.1:5050:5050"

    env_file:
      - .env
    environment:
      - EVIDENCE_ENV=production
      # KOREV_PRODUCTION est lu depuis .env (false par défaut, passer à true
      # une fois AUTH_PASSWORD migré vers un hash Argon2)
      - KOREV_BEHIND_PROXY=true
      - WEB_UI_HOST=0.0.0.0
      - WEB_UI_PORT=5050
      - EVIDENCE_SHARED_DIR=/app/shared
      - PYTHONUNBUFFERED=1
      - EVIDENCE_RSA_PRIVATE_KEY_PATH=/evidence/keys/private.pem
      - EVIDENCE_RSA_KEY_ID=001

    volumes:
      - evidence-data:/app/data
      - evidence-logs:/app/logs
      - evidence-audit:/app/audit
      - evidence-shared:/app/shared  # Per-user workspaces + commun
      - evidence-tmp:/app/tmp        # Chats, uploads, images générées, settings, scheduler
      - evidence-memory:/app/memory  # Mémoire persistante de l'agent IA
      - /evidence/keys:/evidence/keys:ro  # RSA signing keys (non-repudiation)
      # Monter le .env au cas où des scripts le lisent via dotenv
      - ./.env:/app/.env:ro
      # Multi-utilisateurs : créer users.json à partir de users.json.example
      # Sans ce fichier, l'auth mono-user (AUTH_LOGIN/AUTH_PASSWORD dans .env) est utilisée.
      - ./users.json:/app/deploy/users.json:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-4.0}"
          memory: "${MEMORY_LIMIT:-8G}"
        reservations:
          cpus: "1.0"
          memory: "1G"

    networks:
      - evidence-net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ═══════════════════════════════════════════════════════════════════════════
  # EVIDENCE BACKEND DEMO (instance isolée)
  # ═══════════════════════════════════════════════════════════════════════════
  evidence-backend-demo:
    image: korev/evidence-backend:${EVIDENCE_VERSION:-latest}
    container_name: evidence-backend-demo
    restart: unless-stopped

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    env_file:
      - .env
    environment:
      - EVIDENCE_ENV=production
      - KOREV_BEHIND_PROXY=true
      - WEB_UI_HOST=0.0.0.0
      - WEB_UI_PORT=5050
      - EVIDENCE_SHARED_DIR=/app/shared
      - PYTHONUNBUFFERED=1
      - EVIDENCE_RSA_PRIVATE_KEY_PATH=/evidence/keys/private.pem
      - EVIDENCE_RSA_KEY_ID=001

    volumes:
      - evidence-demo-data:/app/data
      - evidence-demo-logs:/app/logs
      - evidence-demo-audit:/app/audit
      - evidence-demo-shared:/app/shared
      - evidence-demo-tmp:/app/tmp
      - evidence-demo-memory:/app/memory
      - /evidence/keys:/evidence/keys:ro  # RSA signing keys (non-repudiation)
      - ./.env:/app/.env:ro
      - ./users.demo.json:/app/deploy/users.json:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT_DEMO:-2.0}"
          memory: "${MEMORY_LIMIT_DEMO:-4G}"
        reservations:
          cpus: "0.5"
          memory: "512M"

    networks:
      - evidence-net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ═══════════════════════════════════════════════════════════════════════════
  # POSTGRES — SGBD relationnel (Migration RDBMS, ADR-007)
  #
  # PHASE P0 — Le service est défini mais GATÉ par le profil "db".
  # Avec `docker compose up -d` standard, ce service NE démarre PAS.
  # Pour le démarrer explicitement (manuel, hors prod) :
  #     docker compose --profile db up -d evidence-postgres
  #
  # Aucun service applicatif (backend, demo, caddy, samba) ne `depends_on` ce
  # service en P0. Le couplage applicatif sera introduit en P1+ via le pattern
  # Repository (cf. docs/adr/ADR-007-postgres-pgvector-adoption.md).
  # ═══════════════════════════════════════════════════════════════════════════
  evidence-postgres:
    image: pgvector/pgvector:pg16
    container_name: evidence-postgres
    restart: unless-stopped
    profiles: ["db"]

    environment:
      POSTGRES_USER: "${POSTGRES_USER:-evidence}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-evidence}"
      PGDATA: /var/lib/postgresql/data/pgdata

    # Postgres n'est PAS exposé sur le réseau hôte par défaut.
    # Décommenter UNIQUEMENT en debug local :
    # ports:
    #   - "127.0.0.1:5432:5432"

    volumes:
      - evidence-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evidence} -d ${POSTGRES_DB:-evidence}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: "${PG_CPU_LIMIT:-2.0}"
          memory: "${PG_MEMORY_LIMIT:-2G}"
        reservations:
          cpus: "0.5"
          memory: "512M"

    networks:
      - evidence-net

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ═══════════════════════════════════════════════════════════════════════════
  # CADDY — Reverse proxy (HTTPS termination + headers sécurité)
  # ═══════════════════════════════════════════════════════════════════════════
  evidence-caddy:
    image: caddy:2-alpine
    container_name: evidence-caddy
    restart: unless-stopped

    ports:
      - "${BIND_HOST:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${BIND_HOST:-0.0.0.0}:${HTTPS_PORT:-443}:443"

    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # Certificats auto Let's Encrypt
      - caddy-config:/config    # Config Caddy persistante
      # Monter les certificats auto-signés si besoin (voir guide)
      # - ./certs:/etc/caddy/certs:ro

    depends_on:
      evidence-backend:
        condition: service_healthy
      evidence-backend-demo:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - evidence-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════════════════
  # SAMBA — Dossiers partagés accessibles depuis les postes Windows (SMB)
  # ═══════════════════════════════════════════════════════════════════════════
  evidence-samba:
    image: dperson/samba:amd64
    container_name: evidence-samba
    restart: unless-stopped

    ports:
      - "${SMB_BIND_HOST:-127.0.0.1}:${SMB_PORT:-445}:445"

    volumes:
      - evidence-shared:/shared

    # Configuration dynamique via entrypoint
    # -u "user;password" crée un utilisateur Samba
    # -s "share;path;browse;readonly;guest;users;admins;writelist;comment"
    #
    # IMPORTANT : les identifiants Samba DOIVENT être définis dans .env
    # Ne JAMAIS mettre de mots de passe en dur ici.
    # Voir .env.example pour le format attendu.
    command: >
      -n
      -p
      -u "${SMB_USER_1:-nicolas;CHANGER_CE_MDP_1}"
      -u "${SMB_USER_2:-luc;CHANGER_CE_MDP_2}"
      -u "${SMB_USER_3:-jeremie;CHANGER_CE_MDP_3}"
      -u "${SMB_USER_4:-coralie;CHANGER_CE_MDP_4}"
      -u "${SMB_USER_5:-dominique;CHANGER_CE_MDP_5}"
      -u "${SMB_USER_6:-laurianne;CHANGER_CE_MDP_6}"
      -u "${SMB_USER_7:-sarah;CHANGER_CE_MDP_7}"
      -u "${SMB_USER_ADMIN:-amine;CHANGER_CE_MDP_ADMIN}"
      -s "nicolas;/shared/users/nicolas;yes;no;no;nicolas,amine;;;Espace Nicolas"
      -s "luc;/shared/users/luc;yes;no;no;luc,amine;;;Espace Luc"
      -s "jeremie;/shared/users/jeremie;yes;no;no;jeremie,amine;;;Espace Jeremie"
      -s "coralie;/shared/users/coralie;yes;no;no;coralie,amine;;;Espace Coralie"
      -s "dominique;/shared/users/dominique;yes;no;no;dominique,amine;;;Espace Dominique"
      -s "laurianne;/shared/users/laurianne;yes;no;no;laurianne,amine;;;Espace Laurianne"
      -s "sarah;/shared/users/sarah;yes;no;no;sarah,amine;;;Espace Sarah"
      -s "commun;/shared/commun;yes;no;no;nicolas,luc,jeremie,coralie,dominique,laurianne,sarah,amine;;;Dossier commun"

    healthcheck:
      test: ["CMD", "smbclient", "-L", "localhost", "-N"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    depends_on:
      evidence-backend:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

    networks:
      - evidence-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES PERSISTANTS
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  evidence-data:
    name: evidence-data
    labels:
      com.korev.evidence.type: "data"
      com.korev.evidence.backup: "true"

  evidence-logs:
    name: evidence-logs
    labels:
      com.korev.evidence.type: "logs"
      com.korev.evidence.backup: "false"

  evidence-audit:
    name: evidence-audit
    labels:
      com.korev.evidence.type: "audit"
      com.korev.evidence.backup: "true"
      com.korev.evidence.retention: "90d"

  caddy-data:
    name: caddy-data

  caddy-config:
    name: caddy-config

  evidence-shared:
    name: evidence-shared
    labels:
      com.korev.evidence.type: "shared-workspaces"
      com.korev.evidence.backup: "true"

  evidence-tmp:
    name: evidence-tmp
    labels:
      com.korev.evidence.type: "tmp-runtime"
      com.korev.evidence.backup: "true"
      com.korev.evidence.description: "Chats, uploads, images générées, settings, scheduler"

  evidence-memory:
    name: evidence-memory
    labels:
      com.korev.evidence.type: "agent-memory"
      com.korev.evidence.backup: "true"

  evidence-demo-data:
    name: evidence-demo-data
    labels:
      com.korev.evidence.type: "data-demo"
      com.korev.evidence.backup: "false"

  evidence-demo-logs:
    name: evidence-demo-logs
    labels:
      com.korev.evidence.type: "logs-demo"
      com.korev.evidence.backup: "false"

  evidence-demo-audit:
    name: evidence-demo-audit
    labels:
      com.korev.evidence.type: "audit-demo"
      com.korev.evidence.backup: "false"

  evidence-demo-shared:
    name: evidence-demo-shared
    labels:
      com.korev.evidence.type: "shared-workspaces-demo"
      com.korev.evidence.backup: "false"

  evidence-demo-tmp:
    name: evidence-demo-tmp
    labels:
      com.korev.evidence.type: "tmp-runtime-demo"
      com.korev.evidence.backup: "false"

  evidence-demo-memory:
    name: evidence-demo-memory
    labels:
      com.korev.evidence.type: "agent-memory-demo"
      com.korev.evidence.backup: "false"

  # Volume Postgres (ADR-007) — créé même si le profil "db" n'est pas activé,
  # mais Docker ne provisionne le volume qu'au premier démarrage du service.
  evidence-postgres-data:
    name: evidence-postgres-data
    labels:
      com.korev.evidence.type: "postgres-data"
      com.korev.evidence.backup: "true"
      com.korev.evidence.retention: "30d"

# ═══════════════════════════════════════════════════════════════════════════════
# RÉSEAU ISOLÉ
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  evidence-net:
    name: evidence-network
    driver: bridge
