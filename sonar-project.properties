# ============================================================================
# Configuration SonarQube / SonarCloud — KOREV Evidence
#
# Neutralisation TRACÉE et JUSTIFIÉE des faux positifs identifiés lors de l'audit
# du cabinet de valorisation (2026-06-04). Chaque exclusion est motivée ci-dessous.
# Voir docs/audit/sonarqube_remediation_2026-06-04.md pour le détail finding→action.
#
# NB : si le scan est piloté par SonarCloud "Automatic Analysis", la projectKey /
# organization sont définies côté UI ; ce fichier n'est alors lu que pour les règles
# d'exclusion. En analyse CI (scanner CLI), décommenter projectKey/organization.
# ============================================================================

# sonar.projectKey=<à renseigner par le cabinet / CI>
# sonar.organization=<à renseigner>
sonar.projectName=KOREV Evidence
sonar.sources=.
sonar.tests=tests
sonar.python.version=3.11

# Exclure les artefacts non pertinents pour l'analyse de qualité/sécurité applicative.
sonar.exclusions=\
  webui/public/fonts/**,\
  **/node_modules/**,\
  **/*.min.js,\
  mcp_servers/**,\
  docs/**

# ----------------------------------------------------------------------------
# Faux positifs python:S2068 / javascript:S2068 ("Credentials should not be hard-coded")
# ----------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=s2068tests,s2068settings,s2068examplehtml,s6859webui

# e1 — Fixtures de test : mots de passe/hashs FACTICES (ex. "plaintext_not_hashed"),
#      nécessaires aux tests d'authentification négatifs. Aucun secret réel.
sonar.issue.ignore.multicriteria.s2068tests.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.s2068tests.resourceKey=tests/**/*.py

# e2 — settings.py : PASSWORD_PLACEHOLDER (masque d'affichage UI "****PSWD****") et
#      exemple pédagogique EMAIL_PASSWORD="..." dans un libellé d'aide. Pas un secret.
sonar.issue.ignore.multicriteria.s2068settings.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.s2068settings.resourceKey=python/helpers/settings.py

# e3 — Fichier d'EXEMPLE de la doc UI (secrets store) : illustratif, pas un secret réel.
sonar.issue.ignore.multicriteria.s2068examplehtml.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.s2068examplehtml.resourceKey=webui/components/settings/secrets/example-secrets.html

# ----------------------------------------------------------------------------
# Faux positif javascript:S6859 ("Use relative paths for imports") — 91 findings webui
# ----------------------------------------------------------------------------
# Le webui est servi par Flask(static_folder="./webui", static_url_path="/") : les
# imports `import "/components/..."` / `from "/js/..."` sont des URL RACINE NAVIGATEUR
# (modules ES natifs), pas des chemins Node/bundler. S6859 cible les projets bundlés où
# "/" = chemin filesystem absolu ; ici "/" = origine HTTP, donc l'absolu est CORRECT.
# Preuve dure : le loader de composants (webui/js/components.js) transforme les scripts
# module inline des fragments .html en Blob ; dans un module Blob, seul un chemin
# racine-absolu se résout (contre l'origine), un import relatif casse. L'absolu y est
# donc OBLIGATOIRE. Convertir en relatif casserait l'UI. → Faux positif assumé.
sonar.issue.ignore.multicriteria.s6859webui.ruleKey=javascript:S6859
sonar.issue.ignore.multicriteria.s6859webui.resourceKey=webui/**/*
