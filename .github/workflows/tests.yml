# ═══════════════════════════════════════════════════════════════════════════════
#  KOREV Oracle — CI Tests (Python 3.11, environnement propre)
#
#  Stratégie en couches (cf. docs/reports/CI_EXECUTION_REPORT.md) :
#    • blocking  → scope + fast + security  (MERGE BLOQUANT, état VERT mesuré)
#    • unit      → suite unitaire hermétique (RAPPORT, 22 échecs connus au 2026-05-29)
#    • extended  → e2e / integration / infra  (RAPPORT, non bloquant)
#    • full      → pytest -q complet          (RAPPORT, non bloquant — timeouts possibles)
# ═══════════════════════════════════════════════════════════════════════════════
name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  EVIDENCE_ENV: development
  CONSENSUS_SIMULATION: "true"
  PYTHONUNBUFFERED: "1"
  # Clé de test pour les suites session8/16 (intégrité des rapports) — pas un secret prod.
  EVIDENCE_HMAC_KEY: "ci-test-hmac-key-minimum-32-characters-long"

jobs:
  blocking:
    name: gates-bloquants
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr poppler-utils libsndfile1 libmagic1 ffmpeg libgl1 libglib2.0-0
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements2.txt
          pip install -r requirements.dev.txt

      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      - name: Gates bloquants (scope + fast + security)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: ./scripts/run_tests.sh blocking

  unit:
    name: gate-unitaire
    runs-on: ubuntu-latest
    needs: blocking
    timeout-minutes: 25
    # Non bloquant tant que les 22 échecs catalogués ne sont pas triés (phase 2).
    continue-on-error: true

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr poppler-utils libsndfile1 libmagic1 ffmpeg libgl1 libglib2.0-0
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements2.txt
          pip install -r requirements.dev.txt

      - name: Gate unitaire (hermétique)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          ./scripts/run_tests.sh unit --junitxml=ci-unit-junit.xml -q --tb=no
          echo "unit_exit=$?" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit
          path: ci-unit-junit.xml
          if-no-files-found: ignore

  extended:
    name: gate-etendu
    runs-on: ubuntu-latest
    needs: blocking
    timeout-minutes: 30
    continue-on-error: true

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr poppler-utils libsndfile1 libmagic1 ffmpeg libgl1 libglib2.0-0
          sudo rm -rf /var/lib/apt/lists/*
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements2.txt -r requirements.dev.txt
          python -m playwright install --with-deps chromium

      - name: Gate étendu (e2e / integration / infra / property)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: ./scripts/run_tests.sh extended -q --tb=no

  full:
    name: gate-full-rapport
    runs-on: ubuntu-latest
    needs: blocking
    timeout-minutes: 45
    continue-on-error: true

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr poppler-utils libsndfile1 libmagic1 ffmpeg libgl1 libglib2.0-0
          sudo rm -rf /var/lib/apt/lists/*
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements2.txt -r requirements.dev.txt
          python -m playwright install --with-deps chromium

      - name: Full suite (rapport — peut TIMEOUT sur tests non hermétiques)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: ./scripts/run_tests.sh full -q --tb=no --junitxml=ci-full-junit.xml

      - name: Upload full JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-full
          path: ci-full-junit.xml
          if-no-files-found: ignore
