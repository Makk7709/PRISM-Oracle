# ═══════════════════════════════════════════════════════════════════════════════
# MAIN GATE — Mandatory for all PRs to main (no paths filter)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Purpose: Prevent regressions from ANY file change before merge to main.
# This is the "you shall not pass" workflow.
#
# Unlike security_ci.yml (path-filtered, fast), this runs on EVERY PR to main.
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Main Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # NO paths filter — runs on ALL PRs to main
    # types explicit to ensure PR updates trigger re-run
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # 1. SMOKE TEST — Basic sanity check
  # ═══════════════════════════════════════════════════════════════════════════════
  
  smoke-test:
    name: Audit Smoke
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run Smoke Tests (BLOCKING)
        run: |
          # Fast sanity check - critical paths only
          # These tests MUST pass — no || true
          pytest tests/test_prism_contract.py tests/test_prism_tally_quorum.py -q --tb=short
      
      - name: Run Audit Smoke (if available)
        run: |
          if [ -f Makefile ] && grep -q "audit-smoke" Makefile; then
            make audit-smoke
          else
            echo "No audit-smoke target in Makefile, skipping"
          fi

  # ═══════════════════════════════════════════════════════════════════════════════
  # 2. SECURITY GATE — All security tests (blocking)
  # ═══════════════════════════════════════════════════════════════════════════════
  
  security-gate:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run ALL Security Tests
        env:
          KOREV_PRODUCTION: 'false'
          KOREV_RATE_LIMIT_BACKEND: 'memory'
          AUTH_LOGIN: 'testuser'
          AUTH_PASSWORD: 'testpass'
        run: |
          pytest tests/security/ -q --tb=short
      
      - name: Rate Limit Coverage Gate (95% min)
        run: |
          pytest tests/security/test_rate_limit*.py tests/security/test_ip.py \
            --cov=python/security/rate_limit \
            --cov=python/security/ip \
            --cov-fail-under=95 \
            --cov-report=term

  # ═══════════════════════════════════════════════════════════════════════════════
  # 3. REDIS MULTI-WORKER — Proves rate limiting works across processes
  # ═══════════════════════════════════════════════════════════════════════════════
  
  redis-multi-worker:
    name: Redis Multi-Worker Proof
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio redis
      
      - name: Verify Redis Available
        run: |
          # Try both hostnames (localhost works on most runners, redis is the service name)
          python -c "
          import redis
          import sys
          
          for url in ['redis://localhost:6379/0', 'redis://redis:6379/0']:
              try:
                  r = redis.from_url(url)
                  if r.ping():
                      print(f'Redis OK at {url}')
                      # Export working URL for subsequent steps
                      with open('$GITHUB_ENV', 'a') if '$GITHUB_ENV' else sys.stdout as f:
                          pass  # env handled below
                      sys.exit(0)
              except Exception as e:
                  print(f'Failed {url}: {e}')
          
          print('ERROR: Redis not available on any URL')
          sys.exit(1)
          "
          # Set env for subsequent steps (localhost is default, works in GHA)
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
      
      - name: Run Redis Backend Tests (NO SKIPS ALLOWED)
        env:
          KOREV_REDIS_URL: 'redis://localhost:6379/0'
          KOREV_RATE_LIMIT_BACKEND: 'redis'
        run: |
          # Run tests and capture output
          pytest tests/security/test_rate_limit_redis.py -v --tb=short 2>&1 | tee redis_test_output.txt
          
          # FAIL if any test was SKIPPED (no silent bypass allowed)
          if grep -q "SKIPPED" redis_test_output.txt; then
            echo "❌ ERROR: Some Redis tests were SKIPPED — this is not allowed!"
            echo "Redis tests must run, not skip. Check Redis connectivity."
            exit 1
          fi
          
          echo "✅ All Redis tests ran (no skips)"
      
      - name: Multi-Worker Shared State Proof
        env:
          KOREV_REDIS_URL: 'redis://localhost:6379/0'
        run: |
          python -c "
          from python.security.rate_limit.redis_backend import RedisBackend
          from python.security.rate_limit.interfaces import RateLimitConfig
          
          config = RateLimitConfig(name='test', max_requests=3, window_seconds=60)
          
          # Simulate two separate workers
          worker1 = RedisBackend(key_prefix='main_gate_test:')
          worker2 = RedisBackend(key_prefix='main_gate_test:')
          
          key = 'login:shared_ip'
          
          # Worker 1: 2 requests
          worker1.check(key, config)
          worker1.check(key, config)
          
          # Worker 2: sees shared state, 1 more allowed
          result = worker2.check(key, config)
          assert result.allowed, 'Third request should be allowed'
          
          # Either worker: 4th blocked
          result = worker1.check(key, config)
          assert not result.allowed, 'Fourth request must be blocked (shared limit)'
          
          # Cleanup
          worker1._get_client().delete(worker1._make_key(key))
          
          print('MULTI-WORKER PROOF PASSED: Rate limit shared across workers')
          "

  # ═══════════════════════════════════════════════════════════════════════════════
  # 4. CORE TESTS — Product promise tests (BLOCKING)
  # ═══════════════════════════════════════════════════════════════════════════════
  
  core-tests:
    name: Core Tests (Blocking)
    runs-on: ubuntu-latest
    # NO continue-on-error — these MUST pass
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run Core Tests (BLOCKING)
        run: |
          # These tests reflect the product promise — MUST pass
          pytest tests/test_prism_contract.py \
                 tests/test_prism_tally_quorum.py \
                 tests/test_router_determinism.py \
                 -v --tb=short
      
      - name: Run Security Tests (BLOCKING)
        env:
          KOREV_PRODUCTION: 'false'
          KOREV_RATE_LIMIT_BACKEND: 'memory'
        run: |
          pytest tests/security/ -q --tb=short

  # ═══════════════════════════════════════════════════════════════════════════════
  # 5. EXTENDED TESTS — Non-blocking (warning only, temporary)
  # ═══════════════════════════════════════════════════════════════════════════════
  # 
  # TODO: Make blocking by Phase 2 milestone
  # "Non-security unit tests currently non-blocking due to instability;
  #  core security + smoke are blocking."
  #
  
  extended-tests:
    name: Extended Tests (Warning)
    runs-on: ubuntu-latest
    continue-on-error: true  # Warning only — TEMPORARY
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Run Extended Tests (non-blocking)
        run: |
          # Extended tests — warning only until stabilized
          pytest tests/ -q --tb=line \
            --ignore=tests/e2e \
            --ignore=tests/property \
            --ignore=tests/security \
            --ignore=tests/test_prism_contract.py \
            --ignore=tests/test_prism_tally_quorum.py \
            --ignore=tests/test_router_determinism.py \
            -m "not slow" \
            || echo "⚠️ Some extended tests failed — review recommended"
